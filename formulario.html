<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reclamação</title>
    <link rel="stylesheet" href="css/formulario.css">
    <link rel="icon" href="img/formulario.png">
</head>

<body>


    <section class="formulario">

        <h2>Fale Conosco</h2>

        <p>Envie sua opinião, sugestão ou reclamação sobre o site.</p>

        <form>
            <label for="nome">Nome:</label>
            <input type="text" id="nome" placeholder="Digite seu nome">

            <label for="email">E-mail:</label>
            <input type="email" id="email" placeholder="Digite seu e-mail">

            <label for="tipo">Assunto:</label>
            <select id="tipo">
                <option>Selecione uma opção</option>
                <option>Elogio</option>
                <option>Sugestão</option>
                <option>Reclamação</option>
                <option>Dúvida</option>
            </select>
            <label for="mensagem">Mensagem:</label>
            <textarea id="mensagem" rows="6" placeholder="Escreva sua mensagem..."></textarea>
            <input type="submit" value="Enviar">
        </form>
    </section>
    <footer><a href="index.html" class="voltar">Voltar</a></footer>
</body>

</html>
